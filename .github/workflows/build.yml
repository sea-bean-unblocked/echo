name: Build Echo Clone Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.1.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'

      - name: Regenerate Gradle wrapper (fixes bad wrapper JAR)
        run: |
          rm -f gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build mod JAR
        run: ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: echoclone-mod-jar
          path: build/libs/echoclone-*.jar
